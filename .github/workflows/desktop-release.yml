# Build Skill Base Desktop (Tauri) on every push to main and publish installers
# to GitHub Releases so users can download without opening Actions artifacts.
name: Desktop Release Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: desktop-release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: desktop-tauri
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            label: macOS DMG
            node_target: darwin-arm64
            artifact-name: desktop-macos
            upload-path: |
              desktop-tauri/src-tauri/target/release/bundle/dmg/*.dmg
          - os: windows-latest
            label: Windows EXE/MSI
            node_target: win-x64
            artifact-name: desktop-windows
            upload-path: |
              desktop-tauri/src-tauri/target/release/bundle/nsis/*.exe
              desktop-tauri/src-tauri/target/release/bundle/msi/*.msi
          - os: ubuntu-latest
            label: Linux packages
            node_target: linux-x64
            artifact-name: desktop-linux
            upload-path: |
              desktop-tauri/src-tauri/target/release/bundle/appimage/*.AppImage
              desktop-tauri/src-tauri/target/release/bundle/deb/*.deb

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: |
            desktop-tauri/pnpm-lock.yaml
            cli/pnpm-lock.yaml

      - name: Install CLI dependencies
        working-directory: cli
        run: pnpm install --frozen-lockfile

      - name: Install desktop-tauri dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop-tauri/src-tauri

      - name: Build Tauri installers
        env:
          SKB_NODE_TARGET: ${{ matrix.node_target }}
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          CI: true
        run: pnpm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.upload-path }}
          if-no-files-found: error
          retention-days: 90

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all platform installers
        uses: actions/download-artifact@v4
        with:
          pattern: desktop-*
          path: installers
          merge-multiple: true

      - name: Show installer files
        run: find installers -type f | sort

      - name: Remove previous desktop-latest release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete desktop-latest --yes 2>/dev/null || true
          git push origin :refs/tags/desktop-latest 2>/dev/null || true

      - name: Create GitHub Release (desktop-latest)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: desktop-latest
          name: Skill Base Desktop
          prerelease: true
          make_latest: true
          fail_on_unmatched_files: true
          body: |
            Tauri 桌面客户端自动构建（`main` @ [`${{ github.sha }}`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})）。

            | 平台 | 文件 |
            |------|------|
            | macOS (Apple Silicon) | `.dmg` |
            | Windows | `.exe`（NSIS）、`.msi` |
            | Linux | `.AppImage`、`.deb` |

            安装包未签名，首次打开 macOS 可能需在「隐私与安全性」中允许；Windows 可能触发 SmartScreen。

            历史构建见 [Releases](${{ github.server_url }}/${{ github.repository }}/releases)。
          files: |
            installers/**/*.dmg
            installers/**/*.exe
            installers/**/*.msi
            installers/**/*.AppImage
            installers/**/*.deb
