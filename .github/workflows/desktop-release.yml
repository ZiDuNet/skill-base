# Build Skill Base Desktop (Tauri) on every push to main and publish installers
# to GitHub Releases so users can download without opening Actions artifacts.
name: Desktop Release Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: desktop-release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: desktop-tauri
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            label: macOS DMG
            node_target: darwin-arm64
            tauri_bundles: dmg
            artifact-name: desktop-macos
            upload-path: desktop-tauri/src-tauri/target/release/bundle/dmg/*.dmg
          - os: windows-latest
            label: Windows NSIS
            node_target: win-x64
            tauri_bundles: nsis
            artifact-name: desktop-windows
            upload-path: desktop-tauri/src-tauri/target/release/bundle/nsis/*.exe
          - os: ubuntu-latest
            label: Linux packages
            node_target: linux-x64
            tauri_bundles: appimage,deb
            artifact-name: desktop-linux
            upload-path: |
              desktop-tauri/src-tauri/target/release/bundle/appimage/*.AppImage
              desktop-tauri/src-tauri/target/release/bundle/deb/*.deb

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: |
            desktop-tauri/pnpm-lock.yaml
            cli/pnpm-lock.yaml

      - name: Install CLI dependencies
        working-directory: cli
        run: pnpm install --frozen-lockfile

      - name: Install desktop-tauri dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop-tauri/src-tauri

      - name: Import Apple Developer certificate
        if: runner.os == 'macOS'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${APPLE_CERTIFICATE:-}" ] || [ -z "${APPLE_CERTIFICATE_PASSWORD:-}" ] || [ -z "${KEYCHAIN_PASSWORD:-}" ]; then
            echo "Apple signing secrets not configured; building unsigned macOS app."
            exit 0
          fi
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain"
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          P12_PATH="$RUNNER_TEMP/certificate.p12"
          # Strip whitespace/newlines from pasted Base64 (common copy-paste issue).
          printf '%s' "$APPLE_CERTIFICATE" | tr -d '[:space:]' | base64 --decode > "$P12_PATH"
          if [ ! -s "$P12_PATH" ]; then
            echo "APPLE_CERTIFICATE decoded to an empty file. Re-export p12 and run: openssl base64 -A -in cert.p12" >&2
            exit 1
          fi
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -t 3600 -u "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security import "$P12_PATH" -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "Identities in CI keychain:"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"
          if ! security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep -q 'Developer ID Application'; then
            echo "::error title=Wrong or invalid signing certificate::No Developer ID Application identity after importing p12. Common causes: (1) p12 is Apple Development / Mac Developer, not Developer ID Application; (2) p12 exported without private key; (3) wrong APPLE_CERTIFICATE_PASSWORD; (4) corrupted Base64 in APPLE_CERTIFICATE. On your Mac run: security find-identity -v -p codesigning | grep 'Developer ID Application'"
            exit 1
          fi

      - name: Check Apple signing secrets
        if: runner.os == 'macOS'
        id: signing
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          if [ -n "${APPLE_CERTIFICATE:-}" ] && [ -n "${APPLE_CERTIFICATE_PASSWORD:-}" ] && [ -n "${KEYCHAIN_PASSWORD:-}" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning title=Unsigned macOS build::Apple signing secrets not configured; building with ad-hoc signing (Gatekeeper may still block until xattr -cr)."
          fi

      - name: Resolve macOS signing identity
        if: runner.os == 'macOS' && steps.signing.outputs.available == 'true'
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          set -euo pipefail
          KEYCHAIN="${KEYCHAIN_PATH:-$RUNNER_TEMP/build.keychain}"
          if [ -n "${APPLE_SIGNING_IDENTITY:-}" ]; then
            echo "APPLE_SIGNING_IDENTITY=$APPLE_SIGNING_IDENTITY" >> "$GITHUB_ENV"
          else
            ID=$(security find-identity -v -p codesigning "$KEYCHAIN" \
              | grep "Developer ID Application" | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
            if [ -z "$ID" ]; then
              echo "Identities found in keychain:" >&2
              security find-identity -v -p codesigning "$KEYCHAIN" >&2 || true
              echo "Set GitHub Secret APPLE_SIGNING_IDENTITY to the full name from: security find-identity -v -p codesigning" >&2
              exit 1
            fi
            echo "APPLE_SIGNING_IDENTITY=$ID" >> "$GITHUB_ENV"
          fi
          echo "Using signing identity: $APPLE_SIGNING_IDENTITY"

      - name: Install App Store Connect API key
        if: runner.os == 'macOS' && steps.signing.outputs.available == 'true'
        env:
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_PRIVATE_KEY: ${{ secrets.APPLE_API_KEY_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${APPLE_API_KEY:-}" ] || [ -z "${APPLE_API_KEY_PRIVATE_KEY:-}" ]; then
            echo "App Store Connect API key not configured."
            exit 0
          fi
          mkdir -p "$HOME/.private_keys"
          KEY_PATH="$HOME/.private_keys/AuthKey_${APPLE_API_KEY}.p8"
          printf '%s\n' "$APPLE_API_KEY_PRIVATE_KEY" > "$KEY_PATH"
          echo "APPLE_API_KEY_PATH=$KEY_PATH" >> "$GITHUB_ENV"

      - name: Configure macOS notarization credentials
        if: runner.os == 'macOS' && steps.signing.outputs.available == 'true'
        env:
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          NOTARIZATION_ENV="$RUNNER_TEMP/notarization.env"
          : > "$NOTARIZATION_ENV"
          trim() { printf '%s' "$1" | tr -d '[:space:]'; }
          ISSUER="$(trim "${APPLE_API_ISSUER:-}")"
          API_KEY="$(trim "${APPLE_API_KEY:-}")"
          API_KEY_PATH="$(trim "${APPLE_API_KEY_PATH:-}")"
          APPLE_ID_TRIM="$(trim "${APPLE_ID:-}")"
          APPLE_PASSWORD_TRIM="$(trim "${APPLE_PASSWORD:-}")"
          TEAM_ID="$(trim "${APPLE_TEAM_ID:-}")"
          # Tauri checks APPLE_ID *before* API Key. Write only one method into notarization.env.
          if [ -n "$ISSUER" ] && [ -n "$API_KEY" ] && [ -n "$API_KEY_PATH" ] && [ -f "$API_KEY_PATH" ]; then
            echo "Notarization via App Store Connect API Key"
            {
              echo "NOTARIZATION_METHOD=api-key"
              echo "APPLE_API_ISSUER=$ISSUER"
              echo "APPLE_API_KEY=$API_KEY"
              echo "APPLE_API_KEY_PATH=$API_KEY_PATH"
            } >> "$NOTARIZATION_ENV"
          elif [ -n "$APPLE_ID_TRIM" ] && [ -n "$APPLE_PASSWORD_TRIM" ] && [ -n "$TEAM_ID" ]; then
            if ! [[ "$TEAM_ID" =~ ^[A-Z0-9]{10}$ ]]; then
              echo "::error title=Invalid APPLE_TEAM_ID::Expected 10-character Team ID (e.g. 48TLUK3DQ8), got length ${#TEAM_ID}. Find it at https://developer.apple.com/account#MembershipDetailsCard"
              exit 1
            fi
            echo "Notarization via Apple ID app-specific password (team id length ${#TEAM_ID})"
            {
              echo "NOTARIZATION_METHOD=apple-id"
              echo "APPLE_ID=$APPLE_ID_TRIM"
              echo "APPLE_PASSWORD=$APPLE_PASSWORD_TRIM"
              echo "APPLE_TEAM_ID=$TEAM_ID"
            } >> "$NOTARIZATION_ENV"
          else
            echo "NOTARIZATION_METHOD=none" >> "$NOTARIZATION_ENV"
            echo "::warning title=Notarization skipped::Signed DMG only. Set API Key secrets (APPLE_API_ISSUER, APPLE_API_KEY, APPLE_API_KEY_PRIVATE_KEY) or Apple ID trio (APPLE_ID, APPLE_PASSWORD, APPLE_TEAM_ID=48TLUK3DQ8)."
          fi
          echo "NOTARIZATION_ENV=$NOTARIZATION_ENV" >> "$GITHUB_ENV"
          echo "Configured notarization method: $(grep '^NOTARIZATION_METHOD=' "$NOTARIZATION_ENV")"

      - name: Build Tauri installers (signed macOS)
        if: runner.os != 'macOS' || steps.signing.outputs.available == 'true'
        env:
          SKB_NODE_TARGET: ${{ matrix.node_target }}
          CI: true
          # Windows: keep unsigned unless you add WIN certificate secrets later
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ matrix.os == 'windows-latest' && 'false' || '' }}
        run: |
          set -euo pipefail
          if [ "${{ runner.os }}" = "macOS" ]; then
            # Drop any empty/leaked notarization vars — Tauri treats "" as set and picks Apple ID first.
            unset APPLE_ID APPLE_PASSWORD APPLE_TEAM_ID APPLE_API_ISSUER APPLE_API_KEY APPLE_API_KEY_PATH || true
            if [ -f "${NOTARIZATION_ENV:-}" ]; then
              set -a
              # shellcheck disable=SC1090
              source "$NOTARIZATION_ENV"
              set +a
            fi
            case "${NOTARIZATION_METHOD:-none}" in
              api-key)
                unset APPLE_ID APPLE_PASSWORD APPLE_TEAM_ID
                echo "Notarization enabled: API Key"
                ;;
              apple-id)
                unset APPLE_API_ISSUER APPLE_API_KEY APPLE_API_KEY_PATH
                echo "Notarization enabled: Apple ID"
                ;;
              *)
                echo "Notarization disabled for this build"
                ;;
            esac
          fi
          pnpm exec tauri build --bundles ${{ matrix.tauri_bundles }}

      - name: Build Tauri installers (unsigned macOS)
        if: runner.os == 'macOS' && steps.signing.outputs.available != 'true'
        env:
          SKB_NODE_TARGET: ${{ matrix.node_target }}
          CI: true
          # Ad-hoc signing: do not pass empty APPLE_* vars (Tauri treats "" as a real identity).
          APPLE_SIGNING_IDENTITY: "-"
        run: pnpm exec tauri build --bundles ${{ matrix.tauri_bundles }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.upload-path }}
          if-no-files-found: error
          retention-days: 90

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all platform installers
        uses: actions/download-artifact@v4
        with:
          pattern: desktop-*
          path: installers
          merge-multiple: true

      - name: Show installer files
        run: find installers -type f | sort

      - name: Remove previous desktop-latest release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete desktop-latest --yes 2>/dev/null || true
          git push origin :refs/tags/desktop-latest 2>/dev/null || true

      - name: Create GitHub Release (desktop-latest)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: desktop-latest
          name: Skill Base Desktop
          prerelease: true
          make_latest: true
          fail_on_unmatched_files: true
          body: |
            Tauri 桌面客户端自动构建（`main` @ [`${{ github.sha }}`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})）。

            | 平台 | 文件 |
            |------|------|
            | macOS (Apple Silicon) | `.dmg` |
            | Windows | `.exe`（NSIS） |
            | Linux | `.AppImage`、`.deb` |

            macOS：若仓库已配置 Apple 签名/公证 Secrets，DMG 已签名可正常打开；否则见 [docs/desktop-macos-signing.md](https://github.com/${{ github.repository }}/blob/main/docs/desktop-macos-signing.md)。Windows 可能触发 SmartScreen。

            历史构建见 [Releases](${{ github.server_url }}/${{ github.repository }}/releases)。
          files: |
            installers/**/*.dmg
            installers/**/*.exe
            installers/**/*.AppImage
            installers/**/*.deb
